
<style>
*{box-sizing:border-box;margin:0;padding:0}
.app{background:#1a1a1a;min-height:100vh;padding:16px;font-family:system-ui,sans-serif;color:#fff}
.header{text-align:center;padding:8px 0 12px}
.header img{max-width:260px;width:100%;height:auto}
.subtitle{color:#aaa;font-size:13px;margin-top:4px}
.main{display:flex;flex-wrap:wrap;gap:20px;justify-content:center;align-items:flex-start;margin-top:12px}
.wheel-col{display:flex;flex-direction:column;align-items:center;gap:14px;flex:1;min-width:260px;max-width:400px}
.canvas-wrap{position:relative;width:100%;max-width:360px}
canvas{display:block;width:100%;border-radius:50%}
.pointer{position:absolute;top:50%;right:-16px;transform:translateY(-50%);width:0;height:0;border-top:16px solid transparent;border-bottom:16px solid transparent;border-right:28px solid #F97316}
.spin-btn{background:#F97316;color:#fff;border:none;border-radius:50px;padding:13px 32px;font-size:15px;font-weight:700;cursor:pointer;width:100%;max-width:300px;transition:transform .1s,background .2s}
.spin-btn:hover{background:#ea6c0a}
.spin-btn:active{transform:scale(0.97)}
.spin-btn:disabled{background:#555;cursor:not-allowed}
.panel{background:#2a2a2a;border-radius:14px;padding:16px;width:100%;max-width:300px;flex:0 0 auto}
.panel-title{font-size:14px;font-weight:600;color:#fff;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.add-row{display:flex;gap:6px;margin-bottom:12px}
.add-row input[type=text]{flex:1;background:#1a1a1a;border:1px solid #444;border-radius:8px;color:#fff;padding:7px 10px;font-size:12px;outline:none}
.add-row input[type=text]:focus{border-color:#F97316}
.add-row input[type=color]{width:34px;height:34px;border:none;border-radius:6px;cursor:pointer;padding:2px;background:#1a1a1a}
.add-btn{background:#F97316;border:none;border-radius:8px;color:#fff;width:34px;height:34px;font-size:18px;font-weight:700;cursor:pointer;flex-shrink:0}
.prize-list{display:flex;flex-direction:column;gap:5px;max-height:300px;overflow-y:auto}
.prize-item{display:flex;align-items:center;gap:8px;background:#1a1a1a;border-radius:8px;padding:6px 8px}
.color-btn{width:22px;height:22px;border-radius:50%;flex-shrink:0;cursor:pointer;border:2px solid rgba(255,255,255,0.3);position:relative;overflow:hidden}
.color-btn input[type=color]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;border:none;padding:0}
.prize-name-input{flex:1;background:transparent;border:none;color:#ddd;font-size:12px;outline:none;width:100%}
.prize-name-input:focus{border-bottom:1px solid #F97316}
.del-btn{background:none;border:none;color:#666;cursor:pointer;font-size:14px;padding:0 2px;line-height:1;flex-shrink:0}
.del-btn:hover{color:#ff5555}
.hint{font-size:11px;color:#666;margin-top:8px;text-align:center}
.result-overlay{display:none;position:absolute;inset:0;border-radius:50%;background:rgba(0,0,0,0.8);align-items:center;justify-content:center;flex-direction:column;text-align:center;padding:20px}
.result-overlay.show{display:flex}
.result-text{font-size:12px;color:#aaa;margin-bottom:4px}
.result-prize{font-size:18px;font-weight:700;word-break:break-word;margin-bottom:2px}
.result-emoji{font-size:30px;margin-bottom:6px}
.result-close{margin-top:10px;background:#F97316;border:none;border-radius:20px;color:#fff;padding:6px 18px;font-size:12px;cursor:pointer;font-weight:600}
@media(max-width:500px){.main{flex-direction:column;align-items:center}.panel{max-width:100%}}
</style>

<script>
let prizes=[
  {name:'100 Bs',color:'#F97316'},
  {name:'Descuento 10%',color:'#3B82F6'},
  {name:'Premio sorpresa',color:'#22C55E'},
  {name:'Otra vuelta',color:'#EF4444'},
  {name:'50 Bs',color:'#A855F7'},
  {name:'Vale gratis',color:'#EAB308'},
  {name:'Sin premio',color:'#EC4899'},
  {name:'Mega premio',color:'#06B6D4'},
];
let spinning=false;
let currentAngle=0;

const canvas=document.getElementById('wheelCanvas');
const ctx=canvas.getContext('2d');
const W=380,H=380,cx=190,cy=190,R=175;

function drawWheel(){
  ctx.clearRect(0,0,W,H);
  const n=prizes.length;
  if(n===0){ctx.fillStyle='#333';ctx.beginPath();ctx.arc(cx,cy,R,0,Math.PI*2);ctx.fill();return;}
  const arc=2*Math.PI/n;
  for(let i=0;i<n;i++){
    const start=currentAngle+i*arc;
    const end=start+arc;
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,R,start,end);ctx.closePath();
    ctx.fillStyle=prizes[i].color;ctx.fill();
    ctx.strokeStyle='rgba(0,0,0,0.2)';ctx.lineWidth=1.5;ctx.stroke();
    ctx.save();ctx.translate(cx,cy);ctx.rotate(start+arc/2);ctx.textAlign='right';
    ctx.fillStyle='#fff';
    ctx.shadowColor='rgba(0,0,0,0.7)';ctx.shadowBlur=3;
    const fs=prizes[i].name.length>14?10:prizes[i].name.length>10?11:13;
    ctx.font=`bold ${fs}px system-ui,sans-serif`;
    ctx.fillText(prizes[i].name,R-8,4);
    ctx.restore();
  }
  ctx.beginPath();ctx.arc(cx,cy,20,0,Math.PI*2);
  ctx.fillStyle='#1a1a1a';ctx.fill();
  ctx.strokeStyle='#F97316';ctx.lineWidth=2.5;ctx.stroke();
  ctx.fillStyle='#F97316';ctx.font='bold 14px system-ui';
  ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('★',cx,cy);
}

function renderList(){
  const list=document.getElementById('prizeList');
  document.getElementById('prizeCount').textContent=`(${prizes.length})`;
  list.innerHTML=prizes.map((p,i)=>`
    <div class="prize-item">
      <div class="color-btn" style="background:${p.color}" title="Cambiar color">
        <input type="color" value="${p.color}" onchange="changeColor(${i},this.value)">
      </div>
      <input class="prize-name-input" value="${p.name}" maxlength="22"
        onchange="changeName(${i},this.value)" onblur="changeName(${i},this.value)">
      <button class="del-btn" onclick="removePrize(${i})" aria-label="Eliminar">✕</button>
    </div>
  `).join('');
  const hint=document.getElementById('hint');
  hint.textContent=prizes.length<2?'Mínimo 2 premios para girar.':prizes.length>=16?'Máximo 16 premios.':'';
  drawWheel();
}

function addPrize(){
  const name=document.getElementById('newName').value.trim();
  const color=document.getElementById('newColor').value;
  if(!name||prizes.length>=16)return;
  prizes.push({name,color});
  document.getElementById('newName').value='';
  renderList();
}

function removePrize(i){if(prizes.length<=1)return;prizes.splice(i,1);renderList();}
function changeColor(i,v){prizes[i].color=v;renderList();}
function changeName(i,v){if(v.trim())prizes[i].name=v.trim();renderList();}

document.getElementById('newName').addEventListener('keydown',e=>{if(e.key==='Enter')addPrize();});

function spin(){
  if(spinning||prizes.length<2)return;
  spinning=true;
  document.getElementById('spinBtn').disabled=true;
  document.getElementById('spinBtn').textContent='Girando...';
  const extra=Math.random()*360;
  const spins=5+Math.floor(Math.random()*5);
  const totalRad=(spins*360+extra)*(Math.PI/180);
  const duration=4000+Math.random()*1500;
  const start=performance.now();
  const startAngle=currentAngle;
  function ease(t){return t<1?1-Math.pow(1-t,3):1;}
  function frame(now){
    const t=Math.min((now-start)/duration,1);
    currentAngle=startAngle+totalRad*ease(t);
    drawWheel();
    if(t<1){requestAnimationFrame(frame);}
    else{
      currentAngle=currentAngle%(2*Math.PI);
      spinning=false;
      document.getElementById('spinBtn').disabled=false;
      document.getElementById('spinBtn').textContent='▶ Girar la ruleta';
      showResult();
    }
  }
  requestAnimationFrame(frame);
}

function showResult(){
  const n=prizes.length;
  const arc=2*Math.PI/n;
  const ptr=3*Math.PI/2;
  let a=((ptr-currentAngle)%(2*Math.PI)+2*Math.PI)%(2*Math.PI);
  const idx=Math.floor(a/arc)%n;
  document.getElementById('resultPrize').textContent=prizes[idx].name;
  document.getElementById('resultPrize').style.color=prizes[idx].color;
  document.getElementById('resultOverlay').classList.add('show');
}

function closeResult(){document.getElementById('resultOverlay').classList.remove('show');}
renderList();
</script>
